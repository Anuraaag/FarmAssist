<div class="min-h-screen bg-white">

  <!-- Install Banner -->
  <div *ngIf="showInstallButton"
    class="bg-primary-pale border-b border-primary-accent px-4 py-2 flex items-center justify-between">
    <div class="flex items-center gap-2 text-primary text-sm font-medium">
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
          clip-rule="evenodd"/>
      </svg>
      Install FarmAssist for offline use
    </div>
    <button
      (click)="installApp()"
      class="bg-primary text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-primary-light transition-colors"
    >
      Install App
    </button>
  </div>

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center gap-3">
      <!-- Leaf Icon -->
      <div class="bg-primary-pale rounded-xl p-2">
        <svg class="w-7 h-7 text-primary" fill="currentColor" viewBox="0 0 24 24">
          <path d="M17 8C8 10 5.9 16.17 3.82 21H5.69C7.35 17.5 9.66 14.17 13.5 12.5c-1.07 2.17-2.25 4.54-3.5 6.5H12c1.38-2.05 2.64-4.33 3.78-6.5A15.07 15.07 0 0121 9c0 0-1.9-.97-4-1z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-primary leading-tight">FarmAssist</h1>
        <p class="text-xs text-gray-500 leading-tight">AI-powered crop disease diagnosis for Indian farmers</p>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-2xl mx-auto px-4 py-6">
    <app-diagnosis></app-diagnosis>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 pb-8 pt-4">
    <p>FarmAssist &mdash; Helping Indian farmers grow healthier crops</p>
  </footer>

</div>
